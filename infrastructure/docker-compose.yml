version: "3.9"

services:
  postgres:
    image: postgres:14
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_MULTIPLE_DATABASES: auth,catalog
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    networks:
      - youtube-clone-net

  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - youtube-clone-net

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - youtube-clone-net

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin && 
      (mc mb myminio/raw-videos || true) &&
      (mc mb myminio/processed-videos || true)
      "
    restart: "no"

  nginx:
    image: nginx:latest
    container_name: nginx
    depends_on:
      - auth
      - upload
      - catalog
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - youtube-clone-net

  auth:
    build: ../services/auth
    container_name: auth
    restart: always
    ports:
      - "8001:8001"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: auth
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    depends_on:
      - postgres
      - redis
      - minio
    networks:
      - youtube-clone-net

  upload:
    build: ../services/upload
    container_name: upload
    restart: always
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/catalog
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      AUTH_SERVICE_URL: http://auth:8001
      SECRET_KEY: "my_very_secret_key_123"
    depends_on:
      - postgres
      - redis
      - minio
      - auth
    networks:
      - youtube-clone-net

  transcoder:
    build: ../services/transcoder  # Change to ../ if your compose file is inside a subfolder
    container_name: transcoder
    restart: always
    environment:
      - DB_URL=postgresql://postgres:postgres@postgres:5432/catalog
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/catalog # Kept both for safety
      - REDIS_URL=redis://redis:6379/0
      - TRANSCODE_QUEUE=video_transcode_queue
      - MINIO_ENDPOINT=http://minio:9000  # Added http:// for boto3 compatibility
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - SECRET_KEY=my_very_secret_key_123
    depends_on:
      - postgres
      - redis
      - minio
    networks:
      - youtube-clone-net

  catalog:
    build: ../services/catalog
    container_name: catalog
    restart: always
    ports:
      - "8003:8001"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: catalog
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    networks:
      youtube-clone-net:
        aliases:
          - catalog   # <--- Forces Docker DNS to map this name explicitly


volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  youtube-clone-net:
    driver: bridge
