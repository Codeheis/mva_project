worker_processes 1;

events {
    worker_connections 1024;
}

http {
    client_max_body_size 500M;
    resolver 127.0.0.11 valid=30s;

    server {
        listen 80;
        server_name _;

        # Regex match: catches anything after /api/auth/
        location ~ ^/api/auth/?(.*)$ {
            # Explicitly append the caught path ($1) and any query parameters
            set $auth_backend "http://auth:8001/$1$is_args$args";
            proxy_pass $auth_backend;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Regex match: catches anything after /api/upload/
        location ~ ^/api/upload/?(.*)$ {
            set $upload_backend "http://upload:8002/$1$is_args$args";
            proxy_pass $upload_backend;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Regex match: catches anything after /api/catalog/
        location ~ ^/api/catalog/?(.*)$ {
            # Rewrite paths cleanly and pass straight to the service name
            proxy_pass http://catalog:8001/$1$is_args$args;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }	
    }
}
